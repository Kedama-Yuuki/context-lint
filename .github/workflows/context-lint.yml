name: context-lint

on:
  pull_request:
    paths:
      - "CLAUDE.md"
      - "DESIGN.md"
      - "*.claude.md"
      - "*.design.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build

      - name: Lint context files
        run: |
          FILES=""
          for f in CLAUDE.md DESIGN.md; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -n "$FILES" ]; then
            node packages/cli/dist/index.js $FILES --threshold 70 --format json | tee context-lint-results.json
          else
            echo "No context files found, skipping."
          fi

      - name: Comment PR with results
        if: always() && hashFiles('context-lint-results.json')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('context-lint-results.json', 'utf-8');
            const results = JSON.parse(raw);
            const arr = Array.isArray(results) ? results : [results];

            let body = '## context-lint Results\n\n';
            for (const r of arr) {
              const icon = r.score >= 90 ? '🟢' : r.score >= 70 ? '🟡' : r.score >= 50 ? '🟠' : '🔴';
              body += `**${r.filePath}** — ${icon} ${r.score}/100 (${r.rank})\n\n`;
              if (r.messages.length > 0) {
                body += '| Line | Severity | Rule | Message |\n';
                body += '|------|----------|------|--------|\n';
                for (const m of r.messages.slice(0, 10)) {
                  body += `| ${m.line}:${m.column} | ${m.severity.toUpperCase()} | ${m.ruleId} | ${m.message.slice(0, 80)} |\n`;
                }
                if (r.messages.length > 10) {
                  body += `\n_...and ${r.messages.length - 10} more_\n`;
                }
              }
              body += '\n';
            }
            body += '\n---\n🤖 Generated by [context-lint](https://github.com/anthropics/context-lint)';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
